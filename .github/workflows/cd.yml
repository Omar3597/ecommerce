name: CD - Deploy to Heroku

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Push & Release to Heroku
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Authenticate with Heroku Container Registry
      #    Heroku requires '_' as the username and the API key as the password.
      - name: Log in to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com

      # 3. Build the 'web' image
      #    PROCESS_TYPE=web → CMD runs migrations then starts the API server.
      - name: Build web image
        run: |
          docker build \
            --target production \
            --build-arg PROCESS_TYPE=web \
            -t registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web \
            .

      # 4. Build the 'worker' image
      #    PROCESS_TYPE=worker → CMD starts the BullMQ worker process.
      #    Docker layer caching from step 3 makes this effectively free.
      - name: Build worker image
        run: |
          docker build \
            --target production \
            --build-arg PROCESS_TYPE=worker \
            -t registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/worker \
            .

      # 5. Push both images to Heroku Container Registry
      - name: Push web image
        run: docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web

      - name: Push worker image
        run: docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/worker

      # 6. Release both process types via the Heroku CLI
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Release web & worker dynos
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release web worker --app ${{ secrets.HEROKU_APP_NAME }}
